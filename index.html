<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Villas-Boas</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="game-container">
        <main class="terminal-section" id="terminal">
            <div class="crt-overlay"></div>
            <div id="output"></div>
            <div class="input-line">
                <span class="prompt">C:\></span>
                <input type="text" id="comando" autocomplete="off" spellcheck="false" autofocus>
            </div>
            <div id="loading" class="spinner-container">
                <div class="spinner"></div> Processando...
            </div>
        </main>

        <aside class="sidebar">
            <div class="panel">
                <h2>STATUS</h2>
                <div class="status-item">
                    <span>SALA:</span> <span id="hud-sala" class="amarelo">BOOT</span>
                </div>
                <div class="status-item">
                    <span>HP:</span> <span id="hud-hp" class="vermelho">...</span>
                </div>
                <div class="status-item">
                    <span>LUZ:</span> <span id="hud-luz" class="amarelo">...</span>
                </div>
            </div>

            <div class="panel">
                <h2>INVENTÁRIO</h2>
                <ul id="hud-inv" class="verde">
                    </ul>
            </div>

            <div class="panel">
                <h2>MAPA / SAÍDAS</h2>
                <ul id="hud-saidas" class="amarelo">
                    </ul>
            </div>

            <div class="panel shortcuts">
                <h2>ATALHOS</h2>
                <p><strong>p</strong> = pegar</p>
                <p><strong>l</strong> = largar</p>
                <p><strong>u</strong> = usar</p>
                <p><strong>x</strong> = examinar</p>
                <p><strong>i</strong> = inventario</p>
                <p><strong>ir [sala]</strong> = andar</p>
            </div>
        </aside>
    </div>

    <script src="/script.js"></script>
</body>
</html>>
